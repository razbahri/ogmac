name: Ogmac
options:
  bundleIdPrefix: com.ogmac
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: NO

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.0"

targets:
  Ogmac:
    type: application
    platform: macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ogmac.app
    sources:
      - path: Ogmac
    info:
      path: Ogmac/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: ogmac
        CFBundleDisplayName: ogmac
        CFBundleIdentifier: com.ogmac.app
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: ""
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Yams
        product: Yams

  OgmacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OgmacTests
    dependencies:
      - target: Ogmac

schemes:
  Ogmac:
    build:
      targets:
        Ogmac: all
        OgmacTests: [test]
    test:
      targets:
        - OgmacTests
